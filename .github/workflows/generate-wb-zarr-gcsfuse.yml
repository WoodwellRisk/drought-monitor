name: Generate monthly Zarr data for drought monitor website - gcsfuse

on:
  workflow_dispatch:

  # push:
  #   branches: [main]
  #   paths:
  #   - 'data_processing/drought_to_zarr_gcsfuse.py'

# permissions needed for the google‑github‑actions steps
permissions:
  contents: read
  id-token: write

jobs:
  generate-wb-zarr-gcsfuse:
    runs-on: ubuntu-latest
    env:
      REGION: us-central1
      SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      WIF_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
      WORKING_DIR: data_processing

    steps:
      # mask gcp service account
      - name: Mask GCP project ID and service account
        run: |
          echo "::add-mask::${{ secrets.GCP_PROJECT_ID }}"
          echo "::add-mask::${{ secrets.GCP_SERVICE_ACCOUNT }}"

      # create a job‑wide MOUNT_POINT from RUNNER_TEMP
      - name: Set mount point variable
        run: |
          echo "MOUNT_POINT=${RUNNER_TEMP}/${BUCKET_NAME}" >> $GITHUB_ENV

       # checkout the repo (needed for docker build)
      - name: Checkout repository
        uses: actions/checkout@v4

      # authenticate to gcp via wif
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      # Store the token for later steps
      - name: Export token for later steps
        run: |
          echo "GCLOUD_ACCESS_TOKEN=${{ steps.auth.outputs.access_token }}" >> $GITHUB_ENV

          # mask token so it never appears in the ui logs
          echo "::add-mask::${{ steps.auth.outputs.access_token }}"

      - name: Install system dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libgeos-dev \
            libproj-dev \
            proj-data \
            libgdal-dev \
            gdal-bin \
            ca-certificates

          sudo apt-get clean

      # install the cloud sdk (gcloud)
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      # install gcsfuse
      - name: Install gcsfuse
        run: |
          export GCSFUSE_REPO=gcsfuse-$(lsb_release -c -s)

          echo "deb http://packages.cloud.google.com/apt $GCSFUSE_REPO main" | sudo tee /etc/apt/sources.list.d/gcsfuse.list

          curl https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo apt-key add -

          sudo apt-get update

          sudo apt-get install -y gcsfuse

      # mount bucket
      - name: Mount Google Cloud bucket (host side)
        env:
          BUCKET: ${{ env.BUCKET_NAME }}
          MOUNT: ${{ env.MOUNT_POINT }}
          CLOUDSDK_AUTH_ACCESS_TOKEN: ${{ env.GCLOUD_ACCESS_TOKEN }}
        run: |
          # Remove any stale mount point (ignore errors)
          sudo fusermount -u "${MOUNT}" || true
          sudo umount -l "${MOUNT}" || true

          sudo rm -rf "${MOUNT}"
          sudo mkdir -p "$MOUNT"
          sudo chown "$(id -u):$(id -g)" "$MOUNT"

          timeout 60s gcsfuse --implicit-dirs "$BUCKET" "$MOUNT"

          echo "✅ mounted gs://$BUCKET at $MOUNT"

      # pin python version
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          check-latest: true

      - name: Install Python dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install --no-cache-dir -r requirements.txt

      - name: Generate Zarr stores from NetCDF data
        working-directory: ${{ env.WORKING_DIR }}
        env:
          BASE_PATH: ${{ env.MOUNT_POINT }}
          GCLOUD_ACCESS_TOKEN: ${{ env.GCLOUD_ACCESS_TOKEN }}
        run: |
          python3 drought_to_zarr_gcsfuse.py

      - name: Unmount bucket
        env:
          MOUNT: ${{ env.MOUNT_POINT }}
        if: always()
        run: |
          sudo fusermount -u "${MOUNT}" || sudo umount "${MOUNT}"
